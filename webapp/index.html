<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eubot Junior — Hermes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <span class="logo">H</span>
        <div>
          <h1>Eubot Junior</h1>
          <span class="subtitle">Hermes</span>
          <span class="status" id="status">Offline</span>
        </div>
      </div>
      <button class="btn-clear" id="btn-clear" title="Nuova chat">&#x2715;</button>
    </header>

    <main class="chat" id="chat">
      <div class="message bot">
        <div class="bubble">Hermes qui. Di cosa vuoi parlare?</div>
      </div>
    </main>

    <footer class="input-bar">
      <textarea id="input" rows="1" placeholder="Scrivi un messaggio..." autocomplete="off"></textarea>
      <button id="btn-send" title="Invia">&#x27A4;</button>
    </footer>
  </div>
  <script src="config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
